name: Consultant OS Control Layer

on:
  pull_request:
    branches: [main]
  push:
    branches: [agent/consultant-os-foundation]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install
      - run: npm run check:cost-control
      - run: npm run test:cost-control
      - run: npm run build
